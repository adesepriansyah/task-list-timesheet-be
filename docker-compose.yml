services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-list-api
    restart: unless-stopped
    ports:
      - "3020:3020"
    environment:
      - CONFIG_PATH=config/local.yml
      - DB_DSN=postgres://postgres:postgres@db:5432/taskdb?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    networks:
      - task-list-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3020/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    container_name: task-list-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=taskdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - task-list-net

networks:
  task-list-net:
    name: task-list-net
    driver: bridge

volumes:
  postgres_data:
